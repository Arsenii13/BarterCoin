<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BarterCoin</title>

<link rel="stylesheet" href="style.css">

<meta name="viewport" content="width=device-width, initial-scale=1">


</head>

<body>

<header class="topbar">
<h1>BarterCoin</h1>
<div class="balance">
<span id="balance">0</span> BC
</div>
</header>


<div id="loginArea" class="center">

<button id="googleLogin" class="bigBtn">
Login with Google
</button>

</div>


<div id="appArea" style="display:none">


<section class="section">

<h2>Send Coins</h2>

<select id="userDropdown"></select>

<input id="amount" type="number" placeholder="Amount">

<button id="sendCoins">Send</button>

</section>


<section class="section">

<h2>Create Listing</h2>

<input id="itemName" placeholder="Item name">

<input id="price" type="number" placeholder="Price">

<button id="createListing">Sell</button>

</section>


<section class="section">

<h2>Marketplace</h2>

<div id="marketplace" class="marketGrid"></div>

</section>

</div>


<nav class="navbar">

<div>🏠</div>
<div>💰</div>
<div>➕</div>
<div>👤</div>

</nav>
<script type="module" src="app.js"></script>
</body>
</html>
