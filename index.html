<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BarterCoin Demo</title>

<script type="module" src="app.js"></script>

<style>
body{
font-family:Arial;
max-width:700px;
margin:auto;
padding:20px;
}

button{
padding:10px;
margin:5px;
}

.card{
border:1px solid #ccc;
padding:10px;
margin-top:10px;
border-radius:8px;
}
</style>

</head>

<body>

<h1>BarterCoin Demo</h1>

<div id="loginArea">
<button id="googleLogin">Login with Google</button>
</div>

<div id="appArea" style="display:none">

<h3>User</h3>
<p id="username"></p>
<p>Balance: <span id="balance"></span> BC</p>

<hr>

<h3>Send Coins</h3>

<input id="targetUID" placeholder="Receiver UID">
<input id="amount" placeholder="Amount">
<button id="sendCoins">Send</button>

<hr>

<h3>Marketplace</h3>

<input id="itemName" placeholder="Item name">
<input id="price" placeholder="Price">
<button id="createListing">Sell Item</button>

<div id="marketplace"></div>

</div>

</body>
</html>
