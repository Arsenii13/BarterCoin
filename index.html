<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BarterCoin</title>
<script type="module" src="app.js"></script>

<style>

body{
font-family:Arial;
max-width:700px;
margin:auto;
padding:20px;
}

button{
padding:8px;
margin:5px;
}

input,select{
padding:6px;
margin:5px;
}

.card{
border:1px solid #ccc;
padding:10px;
margin-top:10px;
border-radius:8px;
}

</style>

</head>

<body>

<h1>BarterCoin</h1>

<div id="loginArea">
<button id="googleLogin">Login with Google</button>
</div>

<div id="appArea" style="display:none">

<h3 id="username"></h3>
Balance: <b><span id="balance"></span> BC</b>

<hr>

<h3>Send Coins</h3>

<select id="userDropdown"></select>

<input id="amount" type="number" placeholder="Amount">

<button id="sendCoins">Send</button>

<hr>

<h3>Create Listing</h3>

<input id="itemName" placeholder="Item name">
<input id="price" type="number" placeholder="Price">

<button id="createListing">Sell</button>

<hr>

<h3>Marketplace</h3>

<div id="marketplace"></div>

</div>

</body>
</html>
